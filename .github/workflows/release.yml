# Release workflow:
# 1. Triggered manually with a version tag
# 2. Builds binaries + wheels for all platforms
# 3. Creates GitHub Release with archives
# 4. Publishes to PyPI
# 5. Publishes to crates.io
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

permissions: {}

env:
  PACKAGE_NAME: copit
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  # Validate the tag and ensure version matches
  plan:
    name: "Plan release"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ inputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: "Extract version"
        id: version
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG}"
          VERSION="${VERSION#v}"  # strip leading 'v'
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Verify Cargo.toml version matches
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

  # Build all platform binaries and wheels
  build:
    needs: plan
    uses: ./.github/workflows/build-binaries.yml

  # Create GitHub Release
  release:
    name: "GitHub Release"
    needs:
      - plan
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: "Download artifacts"
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: "Create GitHub Release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --target "${{ github.sha }}" \
            --title "copit ${RELEASE_TAG}" \
            --generate-notes \
            artifacts/*

  # Publish to PyPI
  publish-pypi:
    name: "Publish to PyPI"
    needs:
      - plan
      - build
      - release
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - name: "Download wheels"
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true
      - name: "Install uv"
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: "Publish to PyPI"
        run: uv publish wheels/*

  # Publish to crates.io
  publish-crates:
    name: "Publish to crates.io"
    needs:
      - plan
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: "Install Rust toolchain"
        run: rustup show
      - name: "Publish to crates.io"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
