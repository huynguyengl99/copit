site_name: copit
site_url: https://huynguyengl99.github.io/copit/
site_description: Copy reusable source code from GitHub repos, HTTP URLs, and ZIP archives into your project
repo_url: https://github.com/huynguyengl99/copit
repo_name: huynguyengl99/copit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra:
  version:
    provider: mike

plugins:
  - search
  - mike

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Contributing: contributing.md
  - Changelog: changelog.md
